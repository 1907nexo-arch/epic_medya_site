<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Güncellemesi | Epic Medya // Yusuf Örnek</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- CSS Dosyası -->
    <link rel="stylesheet" href="yeni2.css">
    <style>
        /* Placeholder Sayfasına Özel Ek Ekran Ortalama Stili */
        .placeholder-body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg-primary);
            overflow: hidden;
            position: relative;
        }
        .placeholder-card {
            background: rgba(20, 20, 23, 0.75);
            border: 1px solid rgba(197, 168, 128, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: var(--spacing-xl) var(--spacing-lg);
            text-align: center;
            max-width: 650px;
            width: 90%;
            border-radius: var(--radius-md);
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 100;
        }
        /* Dönen Altın Selçuklu Yıldızı Yükleniyor (Loading) İkonu */
        .loading-star-spinner {
            width: 70px;
            height: 70px;
            margin: 0 auto var(--spacing-lg) auto;
            animation: spin3D 8s linear infinite;
        }
    </style>
</head>
<body class="placeholder-body">

    <!-- Arka Plan Teknik Grid Çizgileri -->
    <div class="grid-overlay" aria-hidden="true">
        <div class="grid-overlay-line"></div>
        <div class="grid-overlay-line"></div>
        <div class="grid-overlay-line"></div>
        <div class="grid-overlay-line"></div>
    </div>

    <!-- ARKA PLAN GÜMÜŞ/ALTIN GELENEKSEL HİLAL-YILDIZLI TÜRK HALI MADALYONU -->
    <div class="section-motif" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; height: 700px; color: rgba(197, 168, 128, 0.05);" aria-hidden="true">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="1.2" />
            <circle cx="50" cy="50" r="38" stroke="currentColor" stroke-width="0.6" stroke-dasharray="3, 3" />
            <circle cx="50" cy="50" r="28" stroke="currentColor" stroke-width="0.8" />
            <path d="M54,40 C43,40 38,50 42,58 C46,65 56,64 58,56 C51,57 46,51 48,46 C49,42 52,41 54,40 Z" fill="currentColor" fill-opacity="0.5" />
            <polygon points="62,45 64,50 69,50 65,53 67,58 62,55 58,58 60,53 56,50 61,50" fill="currentColor" fill-opacity="0.5" />
        </svg>
    </div>

    <div class="placeholder-card">
        <!-- Dönen Altın Selçuklu Yıldızı -->
        <div class="loading-star-spinner">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,5 62,35 95,35 68,50 80,80 50,65 20,80 32,50 5,35 38,35" stroke="#c5a880" stroke-width="2" />
                <circle cx="50" cy="50" r="10" stroke="#c5a880" stroke-width="1.5" />
            </svg>
        </div>
        <span class="technical-label">// SYSTEM_UPGRADE //</span>
        <h2 style="font-size: var(--font-size-h2); margin-bottom: var(--spacing-sm); color: #fff;">SAYFA GÜNCELLENİYOR</h2>
        <p style="color: var(--color-text-secondary); line-height: 1.6;">Size çok daha kusursuz ve akılda kalıcı interaktif bir siber-sanat deneyimi sunabilmek adına bu sayfanın altyapısı yenileniyor. Çok yakında buradayız.</p>
        <div style="margin-top: var(--spacing-lg);">
            <a href="index.html" class="btn-premium">ANA_SAYFAYA_DÖN</a>
        </div>
    </div>

</body>
</html>
