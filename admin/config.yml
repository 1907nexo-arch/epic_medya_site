# Admin panelinin doğrudan GitHub deponuza güvenli bağlanmasını sağlar
backend:
  name: git-gateway
  branch: main # Deponuzun ana dalı

media_folder: "assets/images"
public_folder: "assets/images"

collections:
  - name: "homepage"
    label: "Ana Sayfa İçerikleri"
    files:
      - file: "assets/data.json"
        label: "Genel Metinler"
        name: "general_texts"
        fields:
          - { label: "Slogan Üstü Label", name: "hero_label", widget: "string" }
          - { label: "Slogan Ana Metin (Glow)", name: "hero_glow_text", widget: "string" }
          - { label: "Slogan Altı Açıklama", name: "hero_desc", widget: "text" }
          - { label: "Telefon Numarası", name: "phone_number", widget: "string" }
          - { label: "E-Posta Adresi", name: "email_address", widget: "string" }