# Decap CMS (Netlify Identity & Git Gateway) Uyumlu Güvenli Bağlantı Altyapısı
backend:
  name: git-gateway
  branch: main # Deponuzun ana dalı

media_folder: "assets/images"
public_folder: "assets/images"

collections:
  - name: "homepage"
    label: "Ana Sayfa İçerikleri"
    files:
      - file: "assets/data.json"
        label: "Tüm Site Metinleri"
        name: "general_texts"
        fields:
          # SLOGAN ALANI (ÜÇ PARÇALI)
          - { label: "Slogan Üstü Label", name: "hero_label", widget: "string" }
          - { label: "Slogan Giriş Kelimesi", name: "hero_title_part1", widget: "string" }
          - { label: "Slogan Vurgulu Kelime (Glow)", name: "hero_glow_text", widget: "string" }
          - { label: "Slogan Son Kelimeleri", name: "hero_title_part2", widget: "string" }
          - { label: "Slogan Altı Açıklama", name: "hero_desc", widget: "text" }
          
          # HAKKIMIZDA ÖZET ALANI
          - { label: "Hakkımızda Başlık", name: "about_title", widget: "string" }
          - { label: "Hakkımızda Özet Metni", name: "about_desc", widget: "text" }
          
          # HİZMETLER ALANI
          - { label: "Hizmetler Genel Başlık", name: "services_title", widget: "string" }
          - { label: "Hizmet 1 Başlık", name: "service1_title", widget: "string" }
          - { label: "Hizmet 1 Açıklama", name: "service1_desc", widget: "text" }
          - { label: "Hizmet 2 Başlık", name: "service2_title", widget: "string" }
          - { label: "Hizmet 2 Açıklama", name: "service2_desc", widget: "text" }
          - { label: "Hizmet 3 Başlık", name: "service3_title", widget: "string" }
          - { label: "Hizmet 3 Açıklama", name: "service3_desc", widget: "text" }
          
          # KAZI KAZAN ALANI
          - { label: "Kazı Kazan Başlık", name: "scratch_title", widget: "string" }
          - { label: "Kazı Kazan Açıklama", name: "scratch_desc", widget: "text" }
          - { label: "Sürpriz Mesaj (Kazınınca Çıkan Yazı)", name: "scratch_message", widget: "text" }
          
          # İLETİŞİM ALANI
          - { label: "Telefon Numarası", name: "phone_number", widget: "string" }
          - { label: "E-Posta Adresi", name: "email_address", widget: "string" }
